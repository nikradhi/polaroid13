<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Majlis Perkahwinan · Polaroid Wedding</title>

  <!-- Tailwind CSS melalui CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* Warna & font datang daripada CSS variable (--warna-*, --font-*)
       yang diset oleh js/tema.js. Lihat terapTema() dalam js/majlis.js. */
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, var(--warna-cahaya) 0%, transparent 60%),
        linear-gradient(180deg, var(--warna-latar) 0%, var(--warna-latar-2) 100%);
      color: var(--warna-teks);
      font-family: var(--font-teks);
      min-height: 100vh;
    }
    .font-serif-elegan { font-family: var(--font-tajuk); }
    .font-tangan { font-family: var(--font-tangan); }
    .btn-tema {
      background: var(--tema);
      color: #fff;
      transition: transform .15s ease, box-shadow .2s ease, filter .2s;
      box-shadow: 0 8px 20px -6px color-mix(in srgb, var(--tema) 60%, transparent);
    }
    .btn-tema:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn-garis {
      border: 1px solid var(--tema);
      color: var(--tema);
      transition: background .2s;
    }
    .btn-garis:hover { background: color-mix(in srgb, var(--tema) 8%, transparent); }
    .teks-tema { color: var(--tema); }
  </style>
</head>

<body class="antialiased" data-corak>

  <!-- Memuat -->
  <div id="zon-memuat" class="min-h-screen flex flex-col items-center justify-center">
    <div class="h-8 w-8 animate-spin rounded-full border-4 border-[color:var(--warna-sempadan)] border-t-[color:var(--warna-utama)]"></div>
    <p class="mt-3 text-sm text-[color:var(--warna-teks-samar)]">Memuatkan majlis…</p>
  </div>

  <!-- Ralat / tidak aktif -->
  <div id="zon-ralat" class="hidden min-h-screen flex flex-col items-center justify-center px-6 text-center">
    <div class="text-5xl mb-3">💌</div>
    <h1 class="font-serif-elegan text-3xl font-semibold mb-2" id="ralat-tajuk">Majlis tidak dijumpai</h1>
    <p class="text-[color:var(--warna-teks-lembut)] max-w-sm" id="ralat-mesej">Pautan ini mungkin salah atau majlis telah tamat.</p>
  </div>

  <!-- Tiada lagi skrin landing 3-butang: js/e.js mengalih terus ke
       gallery.html?e=<eventId> selepas resolusi slug. #zon-memuat kekal
       tampil sebagai spinner ringkas sepanjang resolusi + alihan. -->

  <!-- Laluan root-absolut supaya berfungsi walaupun guna URL cantik /e/<slug> -->
  <!--
    Halaman ini boleh dihidang melalui DUA bentuk URL:
      (a) .../e.html?e=<slug>   — semua hos (GitHub Pages, Netlify, Vercel)
      (b) .../e/<slug>          — URL cantik melalui rewrite (Netlify/Vercel)

    Dalam kes (b) URL pelayar kekal ".../e/<slug>" walaupun fail sebenar ialah
    e.html di root, jadi src relatif "js/e.js" akan tersalah tuju ke
    "/e/js/e.js". Sebab itu src dikira di sini dan tag skrip disuntik secara
    dinamik — tag statik akan ditemui oleh "preload scanner" pelayar dan
    diselesaikan terlalu awal (tag <base> pun tidak sempat membantu).

    Laluan root-absolut "/js/e.js" TIDAK digunakan kerana ia memecahkan
    hosting dalam sub-direktori, cth GitHub Pages project site
    (username.github.io/nama-repo/).

    Skrip ini berada di HUJUNG <body> supaya DOM sudah siap sebelum modul
    (yang membaca getElementById pada aras atas) dilaksanakan.
  -->
  <script>
    (function () {
      var m = location.pathname.match(/^(.*\/)e\/[^/]*$/);
      var s = document.createElement("script");
      s.type = "module";
      s.src = (m ? m[1] : "") + "js/e.js";
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
