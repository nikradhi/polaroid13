<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin · Wedding</title>

  <!-- Tailwind CSS melalui CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, #fbeef0 0%, transparent 60%),
        linear-gradient(180deg, #fdf8f3 0%, #f7efe6 100%);
      color: #5a4a42;
      min-height: 100vh;
    }
    .font-serif-elegan { font-family: 'Cormorant Garamond', serif; }
    .font-tangan { font-family: 'Caveat', cursive; }
    .btn-utama {
      background: linear-gradient(135deg, #c07f89 0%, #b76e79 100%);
      color: #fff;
      transition: transform .15s ease, box-shadow .2s ease, opacity .2s;
      box-shadow: 0 8px 20px -6px rgba(183,110,121,.6);
    }
    .btn-utama:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-utama:disabled { opacity: .6; cursor: not-allowed; }
    .kotak-ralat { background: #fbe4e4; color: #a13a3a; border-radius: 12px; padding: 10px 14px; font-size: .9rem; text-align: center; }
  </style>
</head>

<body class="antialiased">

  <!-- ============ LOG MASUK ============ -->
  <section id="zon-login" class="mx-auto w-full max-w-sm px-5 py-16">
    <header class="text-center mb-8">
      <p class="font-tangan text-2xl text-[#b76e79] mb-1">Panel Pengantin</p>
      <h1 class="font-serif-elegan text-4xl font-semibold tracking-wide">Log Masuk Admin</h1>
      <p class="mt-2 text-sm text-[#8a7a70]">Untuk moderasi gambar tetamu</p>
    </header>

    <form id="form-login" class="space-y-4">
      <div>
        <label for="input-emel" class="block text-sm font-medium mb-1.5">Emel</label>
        <input id="input-emel" type="email" required autocomplete="username"
          class="w-full rounded-xl border border-[#e5d5ca] bg-white/70 px-4 py-3 focus:border-[#b76e79] focus:ring-2 focus:ring-[#d9a5ac]/50 focus:outline-none" />
      </div>
      <div>
        <label for="input-kata-laluan" class="block text-sm font-medium mb-1.5">Kata laluan</label>
        <input id="input-kata-laluan" type="password" required autocomplete="current-password"
          class="w-full rounded-xl border border-[#e5d5ca] bg-white/70 px-4 py-3 focus:border-[#b76e79] focus:ring-2 focus:ring-[#d9a5ac]/50 focus:outline-none" />
      </div>
      <div id="ralat-login" class="hidden kotak-ralat" role="alert"></div>
      <button id="butang-login" type="submit" class="btn-utama w-full rounded-xl py-3.5 font-medium">Log Masuk</button>
    </form>

    <p class="mt-6 text-center text-xs text-[#a09088] leading-relaxed">
      Gunakan emel &amp; kata laluan majlis anda. Anda hanya akan nampak
      gambar majlis sendiri.
    </p>
  </section>

  <!-- ============ PANEL MODERASI ============ -->
  <section id="zon-panel" class="hidden mx-auto w-full max-w-6xl px-4 sm:px-6 py-8">

    <header class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <div>
        <h1 class="font-serif-elegan text-3xl font-semibold">Moderasi Gambar</h1>
        <p class="text-sm text-[#8a7a70]">Log masuk sebagai <span id="emel-admin" class="font-medium"></span></p>
      </div>
      <div class="flex items-center gap-4">
        <a id="pautan-galeri" href="gallery.html" class="text-sm text-[#b76e79] hover:underline">Lihat galeri</a>
        <button id="butang-keluar" class="rounded-xl border border-[#d9a5ac] px-4 py-2 text-sm font-medium text-[#b76e79] hover:bg-white/60 transition">Log Keluar</button>
      </div>
    </header>

    <!-- Luluskan semua yang tersembunyi (pukal) — muncul hanya bila ada gambar tersembunyi -->
    <button id="butang-luluskan-semua"
            class="hidden w-full mb-4 rounded-xl bg-green-50 text-green-700 hover:bg-green-100 py-2.5 text-sm font-medium transition disabled:opacity-60 disabled:cursor-not-allowed">
      ✓ Luluskan semua yang tersembunyi
    </button>

    <!-- Statistik -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="rounded-xl bg-white/70 border border-[#e5d5ca] p-4 text-center">
        <div id="stat-semua" class="text-2xl font-semibold">0</div>
        <div class="text-xs text-[#a09088]">Jumlah</div>
      </div>
      <div class="rounded-xl bg-white/70 border border-[#e5d5ca] p-4 text-center">
        <div id="stat-lulus" class="text-2xl font-semibold text-green-600">0</div>
        <div class="text-xs text-[#a09088]">Dipapar</div>
      </div>
      <div class="rounded-xl bg-white/70 border border-[#e5d5ca] p-4 text-center">
        <div id="stat-sembunyi" class="text-2xl font-semibold text-red-500">0</div>
        <div class="text-xs text-[#a09088]">Disembunyikan</div>
      </div>
    </div>

    <!-- Memuat -->
    <div id="zon-memuat" class="hidden text-center py-16">
      <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-[#e5d5ca] border-t-[#b76e79]"></div>
      <p class="mt-3 text-sm text-[#a09088]">Memuatkan gambar…</p>
    </div>

    <!-- Kosong -->
    <div id="zon-kosong" class="hidden text-center py-16">
      <div class="text-5xl mb-3">📭</div>
      <p class="text-[#8a7a70]">Belum ada gambar dihantar.</p>
    </div>

    <!-- Senarai gambar -->
    <div id="senarai" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </section>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
